<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间线 - 我的空间</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .timeline-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .page-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 年份分组 */
        .year-group {
            margin-bottom: 4rem;
        }
        
        .year-header {
            position: sticky;
            top: 80px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1rem 2rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
            z-index: 10;
        }
        
        .year-header::before {
            content: '📅 ';
        }
        
        .timeline {
            position: relative;
            padding-left: 3rem;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
            border-radius: 3px;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        
        .timeline-item:hover {
            transform: translateX(10px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2.6rem;
            top: 2.5rem;
            width: 16px;
            height: 16px;
            background: var(--primary-color);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: var(--shadow-md);
        }
        
        .timeline-date {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .timeline-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        
        .timeline-description {
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .timeline-tag {
            display: inline-block;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 1rem;
            margin-right: 0.5rem;
        }
        
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            font-size: 1.125rem;
        }
        
        /* 年份导航 */
        .year-nav {
            position: sticky;
            top: 20px;
            background: var(--card-bg);
            padding: 1rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            z-index: 100;
        }
        
        .year-nav-btn {
            padding: 0.5rem 1.25rem;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }
        
        .year-nav-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary-color);
        }
        
        .year-nav-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">
                <a href="index.html">🏠 我的空间</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="journal/index.html">日记</a></li>
                <li><a href="timeline.html" class="active">时间线</a></li>
                <li><a href="about.html">关于我</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="timeline-section">
            <h1 class="page-title">📅 成长时间线</h1>
            
            <!-- 年份导航 -->
            <div class="year-nav" id="year-nav"></div>
            
            <!-- 时间线内容 -->
            <div id="timeline-container">
                <div class="loading">⏳ 加载中...</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 我的个人空间。Built with ❤️ on GitHub Pages</p>
            <div class="social-links">
                <a href="https://github.com/kunjar-git" target="_blank">GitHub</a>
                <a href="mailto:your@email.com">Email</a>
            </div>
        </div>
    </footer>

    <script src="js/version.js"></script>
    <script src="js/timeline.js"></script>
</body>
</html>
