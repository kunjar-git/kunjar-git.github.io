<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术分享 | kunjar 的随想录</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .tech-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
        }
        
        .tech-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .tech-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tech-desc {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .tech-note {
            background: var(--bg-color);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--accent-color);
            text-align: left;
            margin-bottom: 2rem;
        }
        
        .tech-note h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .tech-note p {
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .tech-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
            color: white;
            box-shadow: var(--shadow-md);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .btn-secondary {
            background: var(--card-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        
        .btn-secondary:hover {
            background: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">
                <a href="index.html">🏠 我的空间</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="journal/index.html">日记</a></li>
                <li><a href="timeline.html">时间线</a></li>
                <li><a href="about.html">关于我</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="tech-section">
            <div class="tech-icon">💻</div>
            <h1 class="tech-title">技术分享</h1>
            <p class="tech-desc">
                这里将会分享编程学习心得、技术探索记录和项目开发经验。
            </p>
            
            <div class="tech-note">
                <h3>📝 关于技术内容</h3>
                <p>
                    目前技术类内容正在规划中！未来会包含：
                </p>
                <ul style="margin-top: 1rem; padding-left: 1.5rem; color: var(--text-secondary); line-height: 2;">
                    <li>编程语言学习笔记</li>
                    <li>项目开发实战记录</li>
                    <li>技术工具使用心得</li>
                    <li>问题解决与调试经验</li>
                </ul>
            </div>
            
            <div class="tech-actions">
                <a href="journal/index.html" class="btn btn-primary">
                    📔 浏览所有日记
                </a>
                <a href="timeline.html" class="btn btn-secondary">
                    📅 查看时间线
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 我的个人空间。Built with ❤️ on GitHub Pages</p>
            <div class="social-links">
                <a href="https://github.com/kunjar-git" target="_blank">GitHub</a>
                <a href="mailto:kunjar518@163.com">Email</a>
            </div>
        </div>
    </footer>
</body>
</html>
