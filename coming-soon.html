<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敬请期待 - 我的空间</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .coming-soon-section {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }
        
        .coming-soon-card {
            text-align: center;
            max-width: 600px;
            background: var(--card-bg);
            padding: 4rem 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 2px dashed var(--border-color);
        }
        
        .coming-soon-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .coming-soon-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .coming-soon-desc {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .coming-soon-features {
            text-align: left;
            background: var(--bg-color);
            padding: 2rem;
            border-radius: var(--radius-md);
            margin-bottom: 2rem;
        }
        
        .coming-soon-features h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .coming-soon-features ul {
            list-style: none;
            padding: 0;
        }
        
        .coming-soon-features li {
            padding: 0.5rem 0;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .coming-soon-features li::before {
            content: '✨';
        }
        
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
        }
        
        .back-home-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">
                <a href="index.html">🏠 我的空间</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="journal/index.html">日记</a></li>
                <li><a href="timeline.html">时间线</a></li>
                <li><a href="about.html">关于我</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="coming-soon-section">
            <div class="coming-soon-card">
                <div class="coming-soon-icon">🚧</div>
                <h1 class="coming-soon-title">敬请期待</h1>
                <p class="coming-soon-desc">
                    创意项目页面正在建设中！这里将会展示我的个人作品、创意实验和有趣的项目。
                </p>
                
                <div class="coming-soon-features">
                    <h3>即将上线</h3>
                    <ul>
                        <li>个人作品集展示</li>
                        <li>创意实验记录</li>
                        <li>开源项目介绍</li>
                        <li>更多有趣的内容...</li>
                    </ul>
                </div>
                
                <a href="index.html" class="back-home-btn">
                    ← 返回首页
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 我的个人空间。Built with ❤️ on GitHub Pages</p>
            <div class="social-links">
                <a href="https://github.com/kunjar-git" target="_blank">GitHub</a>
                <a href="mailto:your@email.com">Email</a>
            </div>
        </div>
    </footer>
</body>
</html>
